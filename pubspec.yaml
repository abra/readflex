name: readflex
description: "Mobile reading app with highlights, flashcards, and translation"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Internal packages
  shared:
    path: packages/shared
  monitoring:
    path: packages/monitoring
  component_library:
    path: packages/component_library
  local_storage:
    path: packages/local_storage
  book_repository:
    path: packages/book_repository
  highlight_repository:
    path: packages/highlight_repository
  dictionary_repository:
    path: packages/dictionary_repository
  flashcard_repository:
    path: packages/flashcard_repository
  article_parser:
    path: packages/article_parser
  translation_service:
    path: packages/translation_service
  ai_service:
    path: packages/ai_service
  auth_service:
    path: packages/auth_service
  connectivity_service:
    path: packages/connectivity_service
  subscription_service:
    path: packages/subscription_service
  notification_service:
    path: packages/notification_service

  # Feature packages
  splash:
    path: packages/features/splash
  onboarding:
    path: packages/features/onboarding
  library_feature:
    path: packages/features/library
  import_flow:
    path: packages/features/import_flow
  home_feature:
    path: packages/features/home
  profile_feature:
    path: packages/features/profile

  # External packages
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  package_info_plus: ^9.0.0
  go_router: ^17.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
