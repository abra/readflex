name: readflex
description: "Mobile reading app with library, articles, and highlights"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Internal packages
  domain_models:
    path: packages/domain_models
  shared:
    path: packages/shared
  monitoring:
    path: packages/monitoring
  component_library:
    path: packages/component_library
  local_storage:
    path: packages/local_storage
  book_repository:
    path: packages/book_repository
  collection_repository:
    path: packages/collection_repository
  article_extraction_service:
    path: packages/article_extraction_service
  article_repository:
    path: packages/article_repository
  highlight_repository:
    path: packages/highlight_repository
  connectivity_service:
    path: packages/connectivity_service
  screen_control_service:
    path: packages/screen_control_service
  preferences_service:
    path: packages/preferences_service
  reader_server:
    path: packages/reader_server
  reader_webview:
    path: packages/reader_webview
  toast_service:
    path: packages/toast_service

  # Feature packages
  library_feature:
    path: packages/features/library
  import_flow:
    path: packages/features/import_flow
  highlight:
    path: packages/features/highlight
  reader:
    path: packages/features/reader

  # External packages
  flutter_bloc: ^9.1.1
  package_info_plus: ^9.0.1
  go_router: ^17.3.0
  url_launcher: ^6.3.1
  path: ^1.9.0
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  bloc_test: ^10.0.0
  drift: ^2.34.1
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  sqflite_common_ffi: ^2.4.2
  test: ^1.31.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  # Fonts live physically inside packages/component_library/fonts/ but must
  # be declared here at the APP level to be bundled into the built app and
  # reachable by their short family name. Flutter does not auto-bundle fonts
  # declared only in a package's pubspec.yaml — without this section reader/UI
  # font families silently fall back to platform defaults.
  fonts:
    - family: Geist
      fonts:
        - asset: packages/component_library/fonts/Geist-Variable.ttf
    - family: Literata
      fonts:
        - asset: packages/component_library/fonts/Literata-Variable.ttf
        - asset: packages/component_library/fonts/Literata-Italic-Variable.ttf
          style: italic
    - family: PT Serif
      fonts:
        - asset: packages/component_library/fonts/PTSerif-Regular.ttf
        - asset: packages/component_library/fonts/PTSerif-Italic.ttf
          style: italic
        - asset: packages/component_library/fonts/PTSerif-Bold.ttf
          weight: 700
        - asset: packages/component_library/fonts/PTSerif-BoldItalic.ttf
          weight: 700
          style: italic
    - family: Open Sans
      fonts:
        - asset: packages/component_library/fonts/OpenSans-Variable.ttf
