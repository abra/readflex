<!DOCTYPE html>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
<title>Readflex Reader</title>
<!--
  Preload the variable fonts the reader bundles. Each new chapter
  loads in its own iframe; without preloading, the iframe's fresh
  @font-face rule fetches the font cold and the text reflows from
  fallback to target ("the text straightens out" effect on chapter
  crosses). Preloading here primes the WebView's HTTP cache before
  any iframe is created, so the iframe's later fetch hits the
  cache and the font swap is invisible. Combined with the
  Cache-Control header from ReaderServer, subsequent chapters
  re-use the cached font without a network roundtrip.
-->
<link rel="preload" href="/assets/fonts/Literata-Variable.ttf"
      as="font" type="font/ttf" crossorigin>
<link rel="preload" href="/assets/fonts/Literata-Italic-Variable.ttf"
      as="font" type="font/ttf" crossorigin>
<link rel="preload" href="/assets/fonts/Geist-Variable.ttf"
      as="font" type="font/ttf" crossorigin>
<style>
    html {
      height: 100vh;
      height: var(--readflex-viewport-height, 100dvh);
      overflow: hidden;
    }

    body {
      user-select: none;
      margin: 0 !important;
      height: 100vh;
      height: var(--readflex-viewport-height, 100dvh);
    }


    #footnote-dialog {
      /*
      padding: var(safe-area-inset-top) var(safe-area-inset-right) var(safe-area-inset-bottom) var(safe-area-inset-left);
      */
      position: fixed;
      width: 80vw;
      height: 80vh;
      max-width: 400px;
      max-height: 200px;
      min-width: 300px;
      min-height: 200px;
      border-radius: 15px;
      border: 1px solid grey;
      user-select: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      outline: none;
      z-index: 1000;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      /* Hidden by default; book.js flips to display:block when a
         footnote is clicked. Without this, the empty dialog flashes
         briefly between HTML parse and book.js execution every time
         the reader opens. */
      display: none;
      flex-direction: column;
    }

    #footnote-dialog main {
      overflow: auto;
      width: 100%;
      height: 100%;
    }
</style>
<div id="footnote-dialog">
    <main></main>
</div>
<script>
    (function () {
      // Global JS error capture. Forwards uncaught exceptions and
      // unhandled promise rejections to Dart via the same callHandler
      // bridge book.js uses. Without this, silent JS errors disappear
      // (foliate-js try/catch swallow what they care about, the rest
      // ends up in the WebKit console which is invisible to Flutter
      // logs unless Safari Inspector is attached).
      const reportJsError = (payload) => {
        try {
          if (window.flutter_inappwebview && window.flutter_inappwebview.callHandler) {
            window.flutter_inappwebview.callHandler('onJsError', payload);
          }
        } catch (e) { /* bridge not ready; nothing we can do */ }
      };
      window.onerror = function (msg, src, line, col, err) {
        reportJsError({
          kind: 'error',
          msg: String(msg),
          src: src ? String(src) : null,
          line: Number.isFinite(line) ? line : null,
          col: Number.isFinite(col) ? col : null,
          stack: err && err.stack ? String(err.stack) : null,
        });
        return false; // let default handler run too
      };
      window.onunhandledrejection = function (e) {
        const reason = e && e.reason;
        reportJsError({
          kind: 'unhandledrejection',
          msg: reason ? String(reason && reason.message ? reason.message : reason) : 'unhandled rejection',
          stack: reason && reason.stack ? String(reason.stack) : null,
        });
      };

      const updateReadflexViewportHeight = () => {
        const viewport = window.visualViewport;
        const height = viewport && Number.isFinite(viewport.height)
          ? viewport.height
          : window.innerHeight;
        if (!Number.isFinite(height) || height <= 0) return;
        document.documentElement.style.setProperty(
          '--readflex-viewport-height',
          `${height}px`,
        );
      };
      updateReadflexViewportHeight();
      window.addEventListener('resize', updateReadflexViewportHeight);
      window.visualViewport?.addEventListener(
        'resize',
        updateReadflexViewportHeight,
      );

      const loadScript = (src, options = {}) => new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        if (options.type) script.type = options.type;
        if (options.async !== undefined) script.async = options.async;
        if (options.defer !== undefined) script.defer = options.defer;
        script.onload = () => resolve();
        script.onerror = (err) => {
          console.error('Failed to load script', src, err);
          reject(err);
        };
        document.head.appendChild(script);
      });

      (async () => {
        await loadScript('./src/vendor/pdfjs/pdf.js', { async: false, defer: false });
        await loadScript('./src/book.js', { type: 'module' });
      })();
    })();
</script>
