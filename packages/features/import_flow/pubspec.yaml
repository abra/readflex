name: import_flow
description: Bottom sheet for adding books (file picker) and articles (URL)
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  shared:
    path: ../../shared
  article_repository:
    path: ../../article_repository
  article_parser:
    path: ../../article_parser
  component_library:
    path: ../../component_library

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
