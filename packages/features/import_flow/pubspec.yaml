name: import_flow
description: Bottom sheet for adding book files (EPUB / PDF / FB2 / ...) to the library
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  equatable: ^2.0.8
  file_picker: ^11.0.2
  flutter_bloc: ^9.1.1
  path: ^1.9.0

  component_library:
    path: ../../component_library
  domain_models:
    path: ../../domain_models
  book_repository:
    path: ../../book_repository
  reader_webview:
    path: ../../reader_webview
  monitoring:
    path: ../../monitoring

dev_dependencies:
  flutter_test:
    sdk: flutter

  bloc_test: ^10.0.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
