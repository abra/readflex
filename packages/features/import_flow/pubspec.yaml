name: import_flow
description: Bottom sheet for adding books (file picker) and articles (URL)
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  file_picker: ^11.0.2

  component_library:
    path: ../../component_library
  domain_models:
    path: ../../domain_models
  book_repository:
    path: ../../book_repository
  article_repository:
    path: ../../article_repository
  article_parser:
    path: ../../article_parser
  reader_webview:
    path: ../../reader_webview
  monitoring:
    path: ../../monitoring

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
