name: practice
description: Review flashcards and highlights with spaced repetition
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  domain_models:
    path: ../../domain_models
  flashcard_repository:
    path: ../../flashcard_repository
  highlight_repository:
    path: ../../highlight_repository
  dictionary_repository:
    path: ../../dictionary_repository
  component_library:
    path: ../../component_library

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
