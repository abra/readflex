name: reader
description: Book reader with text selection actions
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  stream_transform: ^2.1.0

  domain_models:
    path: ../../domain_models
  shared:
    path: ../../shared
  preferences_service:
    path: ../../preferences_service
  book_repository:
    path: ../../book_repository
  highlight_repository:
    path: ../../highlight_repository
  component_library:
    path: ../../component_library
  reader_webview:
    path: ../../reader_webview

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  shared_preferences_platform_interface: ^2.4.1

flutter:
  uses-material-design: true
