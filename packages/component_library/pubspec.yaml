name: component_library
description: "UI components, theme and design tokens."
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  lucide_icons: ^0.257.0

flutter:
  fonts:
    - family: Geist
      fonts:
        - asset: fonts/Geist-Variable.ttf
    - family: SourceSerif4
      fonts:
        - asset: fonts/SourceSerif4-Variable.ttf
        - asset: fonts/SourceSerif4-Italic-Variable.ttf
          style: italic

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
