name: component_library
description: "UI components, theme and design tokens."
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

flutter:
  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter-Variable.ttf
    - family: SourceSerif4
      fonts:
        - asset: fonts/SourceSerif4-Variable.ttf
        - asset: fonts/SourceSerif4-Italic-Variable.ttf
          style: italic
    - family: Geist
      fonts:
        - asset: fonts/Geist-Regular.ttf
          weight: 400
        - asset: fonts/Geist-Medium.ttf
          weight: 500
        - asset: fonts/Geist-SemiBold.ttf
          weight: 600
        - asset: fonts/Geist-Bold.ttf
          weight: 700

dev_dependencies:
  flutter_test:
    sdk: flutter
